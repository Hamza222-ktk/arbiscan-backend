version: '3.8'

services:
  arbiscan-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbiscan-backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - arbiscan-db-data:/usr/src/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_DATABASE=/usr/src/app/data/db.sqlite
      - THROTTLER_TTL=60000
      - THROTTLER_LIMIT=120

volumes:
  arbiscan-db-data:
    driver: local
